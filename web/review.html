<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReRIKAI - 復習</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a; --bg: #ffffff; --border: #d0d0d0; --accent: #2563eb;
    --muted: #666; --error: #c0392b; --ok: #1e7e34; --cell-bg: #f7f7f8;
    --rikai: #7c3aed; --next: #2563eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #eaeaea; --bg: #121212; --border: #444; --accent: #60a5fa;
      --muted: #aaa; --error: #ff6b6b; --ok: #4ade80; --cell-bg: #1c1c1e;
      --rikai: #a78bfa; --next: #60a5fa;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 640px; margin: 0 auto; padding: 16px; color: var(--fg); background: var(--bg); line-height: 1.6;
  }
  h1 { font-size: 1.3rem; }
  a { color: var(--accent); }
  .topnav { margin-bottom: 12px; font-size: 0.9rem; }
  .status { margin-top: 12px; white-space: pre-wrap; font-size: 0.9rem; color: var(--muted); }
  .status.error { color: var(--error); }
  .status.ok { color: var(--ok); }
  .progress { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; text-align: center; }

  /* フラッシュカード本体 */
  .card {
    position: relative; border: 1px solid var(--border); border-radius: 14px;
    padding: 22px 18px; margin-top: 10px; min-height: 240px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; cursor: pointer; background: var(--cell-bg);
    user-select: none; transition: border-color 0.15s;
  }
  .card:active { border-color: var(--accent); }
  .card .face-label { position: absolute; top: 10px; left: 14px; font-size: 0.7rem; color: var(--muted); }
  .card .qtype { position: absolute; top: 10px; left: 64px; font-size: 0.65rem; background: var(--border); border-radius: 4px; padding: 1px 6px; color: var(--fg); }
  .detail-btn {
    position: absolute; top: 8px; right: 10px; margin: 0;
    padding: 4px 10px; font-size: 0.75rem; background: transparent;
    color: var(--muted); border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
  }
  .card .question { font-size: 1.25rem; font-weight: bold; }
  .card .answer-main { font-size: 1.2rem; font-weight: bold; }
  .card .supplement { font-size: 0.92rem; margin-top: 12px; text-align: left; width: 100%; color: var(--fg); }
  .card .supplement ul { margin: 4px 0 0; padding-left: 1.2em; }
  .card .flip-hint { position: absolute; bottom: 10px; font-size: 0.72rem; color: var(--muted); }

  /* 詳細パネル */
  .detail-panel {
    border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-top: 10px;
    font-size: 0.82rem; color: var(--fg); background: var(--bg);
  }
  .detail-panel dl { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; margin: 0; }
  .detail-panel dt { color: var(--muted); }
  .detail-panel dd { margin: 0; word-break: break-word; }

  /* 判定ボタン */
  .grade-buttons { display: flex; gap: 10px; margin-top: 16px; }
  .grade-buttons button { flex: 1; padding: 14px 12px; border: none; border-radius: 10px; color: #fff; font-size: 1.05rem; font-weight: bold; cursor: pointer; }
  .grade-buttons button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-rikai { background: var(--rikai); }
  .btn-next { background: var(--next); }
  .btn-note { font-size: 0.72rem; color: var(--muted); text-align: center; margin-top: 8px; }

  #masteredArea { margin-top: 20px; text-align: left; }
  #masteredArea h2 { font-size: 1.05rem; }
  .mastered-item { border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-top: 8px; }
  .mastered-item .mq { font-weight: bold; }
  .mastered-item .ma { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
  .mastered-item button { margin-top: 8px; padding: 8px 12px; font-size: 0.85rem; background: var(--next); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  .mastered-item button:disabled { opacity: 0.5; cursor: not-allowed; }
  details.apibox { margin-bottom: 12px; }
  #apiUrl { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); font-size: 0.8rem; margin-top: 4px; }
  details.apibox button { margin-top: 8px; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
  <h1>ReRIKAI - 今日の復習</h1>
  <div class="topnav">
    <a href="calendar.html">📅 カレンダー</a>
    ｜<a href="cards.html">🗂 カード一覧</a>
    ｜<a href="session.html">＋ 新規セッション</a>
  </div>

  <details class="apibox">
    <summary>API接続設定</summary>
    <label for="apiUrl">API URL</label>
    <input type="text" id="apiUrl" placeholder="https://xxxx.execute-api.ap-northeast-1.amazonaws.com/api">
    <button type="button" id="saveApiUrlBtn">保存</button>
  </details>

  <div class="status" id="status"></div>
  <div class="progress" id="progress"></div>

  <div id="cardArea" hidden>
    <div class="card" id="card">
      <span class="face-label" id="faceLabel">問題</span>
      <span class="qtype" id="qtype"></span>
      <button type="button" class="detail-btn" id="detailBtn">詳細</button>

      <div id="frontFace">
        <div class="question" id="question"></div>
      </div>

      <div id="backFace" hidden>
        <div class="answer-main" id="answer"></div>
        <div class="supplement" id="supplement"></div>
      </div>

      <div class="flip-hint" id="flipHint">タップで答えを見る</div>
    </div>

    <div class="detail-panel" id="detailPanel" hidden></div>

    <div class="grade-buttons">
      <button type="button" class="btn-rikai" id="rikaiBtn" data-result="mastered">リリカイ!</button>
      <button type="button" class="btn-next" id="nextBtn" data-result="again">次のカードへ</button>
    </div>
    <div class="btn-note">「リリカイ!」＝理解できた（もう出しません）／「次のカードへ」＝また出す（翌日）</div>
  </div>

  <div id="doneArea" hidden>
    <p class="status ok" id="doneMsg"></p>

    <div id="masteredArea" hidden>
      <h2>リリカイ済みカードを復習に戻す</h2>
      <p class="btn-note" style="text-align:left;">「リリカイ!」で外したカードです。やっぱり理解できていないと感じたら「復習に戻す」で当日の復習に再表示されます。</p>
      <div id="masteredList"></div>
    </div>

    <p style="margin-top:16px;"><a href="calendar.html">カレンダーへ戻る</a></p>
  </div>

<script src="shared.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  let queue = [];
  let index = 0;
  let currentReviewId = null;
  let flipped = false;
  let submitting = false;

  function setStatus(message, type = "") {
    $("status").textContent = message;
    $("status").className = "status" + (type ? " " + type : "");
  }

  function newReviewId() {
    return "review_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
  }

  async function loadDue() {
    setStatus("今日の復習カードを読み込み中です...", "");
    try {
      const data = await callApi({ action: "listDueCards" });
      queue = data.cards || [];
      index = 0;
      if (queue.length === 0) {
        setStatus("", "");
        $("progress").textContent = "";
        $("cardArea").hidden = true;
        $("doneArea").hidden = false;
        $("doneMsg").textContent = "今日の復習はありません。お疲れさまでした。";
        loadMastered();
        return;
      }
      setStatus("", "");
      showCard();
    } catch (error) {
      setStatus(error.message || "読み込みに失敗しました。", "error");
    }
  }

  function showCard() {
    if (index >= queue.length) {
      $("cardArea").hidden = true;
      $("doneArea").hidden = false;
      $("progress").textContent = "";
      setStatus("", "");
      $("doneMsg").textContent = `復習完了！ ${queue.length}枚を確認しました。「リリカイ!」したカードは今後の復習に出ません。`;
      loadMastered();
      return;
    }
    const card = queue[index];
    currentReviewId = newReviewId();
    flipped = false;
    $("progress").textContent = `${index + 1} / ${queue.length}`;
    $("qtype").textContent = card.cardType || "";
    $("question").textContent = card.question || "";
    $("answer").textContent = card.canonicalAnswer || "";
    const sup = (card.supplement || []);
    $("supplement").innerHTML = sup.length
      ? "<ul>" + sup.map((s) => `<li>${escapeHtml(s)}</li>`).join("") + "</ul>" : "";
    renderDetail(card);
    // 表面から開始
    $("frontFace").hidden = false;
    $("backFace").hidden = true;
    $("faceLabel").textContent = "問題";
    $("flipHint").textContent = "タップで答えを見る";
    $("detailPanel").hidden = true;
    $("cardArea").hidden = false;
    $("doneArea").hidden = true;
  }

  function flipCard() {
    flipped = !flipped;
    $("frontFace").hidden = flipped;
    $("backFace").hidden = !flipped;
    $("faceLabel").textContent = flipped ? "答え" : "問題";
    $("flipHint").textContent = flipped ? "タップで問題に戻る" : "タップで答えを見る";
  }

  function renderDetail(card) {
    const r = card.review || {};
    const rows = [
      ["分野", card.subject || "(なし)"],
      ["資格・コース", card.qualification || "(なし)"],
      ["カード種別", card.cardType || "(なし)"],
      ["conceptKey", card.conceptKey || "(なし)"],
      ["復習回数", String(r.reviewCount || 0)],
      ["習熟度", String(r.masteryLevel || 0) + " / 5"],
      ["次回復習日", r.nextReviewDate || "(未設定)"],
      ["出典セッション数", String((card.sourceSessionIds || []).length)]
    ];
    $("detailPanel").innerHTML = "<dl>" +
      rows.map(([k, v]) => `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(v)}</dd>`).join("") + "</dl>";
  }

  async function grade(result) {
    if (submitting) return;
    const card = queue[index];
    submitting = true;
    setButtonsDisabled(true);
    setStatus("記録中です...", "");
    try {
      await callApi({ action: "reviewCard", cardId: card.cardId, result, reviewId: currentReviewId });
      index++;
      setStatus("", "");
      showCard();
    } catch (error) {
      setStatus(error.message || "記録に失敗しました。もう一度お試しください。", "error");
    } finally {
      submitting = false;
      setButtonsDisabled(false);
    }
  }

  function setButtonsDisabled(disabled) {
    $("rikaiBtn").disabled = disabled;
    $("nextBtn").disabled = disabled;
  }

  // 「リリカイ済み（mastered）」カードを一覧し、復習へ戻せるようにする。
  async function loadMastered() {
    try {
      const data = await callApi({ action: "listMasteredCards" });
      renderMastered(data.cards || []);
    } catch (error) {
      // 失敗しても復習完了表示は妨げない。
    }
  }

  function renderMastered(cards) {
    const area = $("masteredArea");
    const list = $("masteredList");
    list.innerHTML = "";
    if (!cards.length) { area.hidden = true; return; }
    area.hidden = false;
    cards.forEach((card) => {
      const div = document.createElement("div");
      div.className = "mastered-item";

      const q = document.createElement("div");
      q.className = "mq";
      q.textContent = card.question || "";
      const a = document.createElement("div");
      a.className = "ma";
      a.textContent = card.canonicalAnswer || "";

      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = "復習に戻す";
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        btn.textContent = "戻しています...";
        try {
          await callApi({ action: "reactivateCard", cardId: card.cardId });
          div.remove();
          if (!list.children.length) area.hidden = true;
        } catch (error) {
          btn.disabled = false;
          btn.textContent = "復習に戻す（再試行）";
        }
      });

      div.appendChild(q);
      div.appendChild(a);
      div.appendChild(btn);
      list.appendChild(div);
    });
  }

  // カードのタップでめくる（詳細ボタンのタップはめくらない）。
  $("card").addEventListener("click", (event) => {
    if (event.target.closest("#detailBtn")) return;
    flipCard();
  });
  $("detailBtn").addEventListener("click", (event) => {
    event.stopPropagation();
    $("detailPanel").hidden = !$("detailPanel").hidden;
  });
  $("rikaiBtn").addEventListener("click", () => grade("mastered"));
  $("nextBtn").addEventListener("click", () => grade("again"));
  $("saveApiUrlBtn").addEventListener("click", () => {
    setApiUrl($("apiUrl").value);
    setStatus("API URLを保存しました。再読み込みします。", "");
    loadDue();
  });

  $("apiUrl").value = getApiUrl();
  loadDue();
</script>
</body>
</html>
