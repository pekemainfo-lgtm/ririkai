<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReRIKAI - カード一覧</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a; --bg: #ffffff; --border: #d0d0d0; --accent: #2563eb;
    --muted: #666; --error: #c0392b; --ok: #1e7e34; --cell-bg: #f7f7f8; --badge-bg: #dbe4ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #eaeaea; --bg: #121212; --border: #444; --accent: #60a5fa;
      --muted: #aaa; --error: #ff6b6b; --ok: #4ade80; --cell-bg: #1c1c1e; --badge-bg: #2a3a5c;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 720px; margin: 0 auto; padding: 16px; color: var(--fg); background: var(--bg); line-height: 1.5;
  }
  h1 { font-size: 1.3rem; }
  a { color: var(--accent); }
  .topnav { margin-bottom: 12px; font-size: 0.9rem; }
  .status { margin-top: 12px; white-space: pre-wrap; font-size: 0.9rem; color: var(--muted); }
  .status.error { color: var(--error); }
  .status.ok { color: var(--ok); }
  .backlink { cursor: pointer; color: var(--accent); font-size: 0.9rem; display: inline-block; margin-bottom: 10px; }
  .card-row {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer;
  }
  .card-row:hover { border-color: var(--accent); }
  .card-row h3 { margin: 0 0 4px; font-size: 0.98rem; }
  .card-meta { font-size: 0.76rem; color: var(--muted); }
  .badge { display:inline-block; font-size: 0.68rem; background: var(--badge-bg); border-radius: 4px; padding: 1px 6px; margin-right: 4px; }
  label { display:block; font-size: 0.82rem; margin-top: 10px; color: var(--muted); }
  input[type="text"], textarea, select {
    width: 100%; padding: 8px; margin-top: 4px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--fg); font-size: 0.95rem;
  }
  textarea { min-height: 60px; resize: vertical; }
  button {
    margin-top: 12px; padding: 8px 16px; border: none; border-radius: 6px;
    background: var(--accent); color: #fff; font-size: 0.95rem; cursor: pointer;
  }
  button.secondary { background: var(--border); color: var(--fg); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  details.apibox { margin-bottom: 12px; }
  #apiUrl { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); font-size: 0.8rem; margin-top: 4px; }
  [hidden] { display: none !important; }
  .detail dt { font-size: 0.8rem; color: var(--muted); margin-top: 10px; }
  .detail dd { margin: 2px 0 0; }
  .filters { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; }
  .filter-row { display: flex; gap: 8px; }
  .filter-row > * { flex: 1; margin-top: 8px; }
  .filters input, .filters select { margin-top: 8px; }
  .filter-actions { display: flex; gap: 8px; margin-top: 4px; }
  .filter-actions button { flex: 1; }
  .pager { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 10px; }
  .pager button { margin-top: 0; }
  .pager #pageInfo { font-size: 0.82rem; color: var(--muted); }
</style>
</head>
<body>
  <h1>ReRIKAI - カード一覧</h1>
  <div class="topnav">
    <a href="calendar.html">📅 カレンダー</a>
    ｜<a href="session.html">＋ 新規セッション</a>
    ｜<a href="review.html">🔁 復習</a>
  </div>

  <details class="apibox">
    <summary>API接続設定</summary>
    <label for="apiUrl">API URL</label>
    <input type="text" id="apiUrl" placeholder="https://xxxx.execute-api.ap-northeast-1.amazonaws.com/api">
    <button type="button" id="saveApiUrlBtn">保存</button>
  </details>

  <div class="status" id="status"></div>

  <!-- 一覧 -->
  <div id="listView">
    <div class="filters">
      <div class="filter-row">
        <input type="text" id="fQualification" placeholder="資格・コースで絞る" list="qualList" autocomplete="off">
        <input type="text" id="fSubject" placeholder="分野で絞る" list="subjList" autocomplete="off">
      </div>
      <input type="text" id="fQuery" placeholder="質問文・答えで検索" autocomplete="off">
      <div class="filter-row">
        <select id="fSort">
          <option value="">新しい順</option>
          <option value="recentMastered">最近リリカイした順</option>
        </select>
        <select id="fLimit">
          <option value="20">20件ずつ</option>
          <option value="30" selected>30件ずつ</option>
          <option value="50">50件ずつ</option>
        </select>
      </div>
      <div class="filter-actions">
        <button type="button" id="searchBtn">検索</button>
        <button type="button" id="clearFilterBtn" class="secondary">クリア</button>
      </div>
      <datalist id="qualList"></datalist>
      <datalist id="subjList"></datalist>
    </div>

    <div id="cardList"></div>

    <div class="pager" id="pager" hidden>
      <button type="button" id="prevBtn" class="secondary">‹ 前へ</button>
      <span id="pageInfo"></span>
      <button type="button" id="nextBtn" class="secondary">次へ ›</button>
    </div>
  </div>

  <!-- 詳細 -->
  <div id="detailView" hidden>
    <span class="backlink" id="detailBack">‹ 一覧へ戻る</span>

    <div id="conflictPanel" hidden style="border:1px solid var(--error);border-radius:8px;padding:12px;margin-bottom:12px;">
      <strong style="color:var(--error)">回答候補に矛盾があります（要確認）</strong>
      <div id="conflictBody" style="font-size:0.9rem;margin-top:6px;"></div>
      <label for="resolveAnswer">現在の正解として採用する内容</label>
      <textarea id="resolveAnswer"></textarea>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button type="button" id="useExistingBtn" class="secondary">既存を採用</button>
        <button type="button" id="useNewBtn" class="secondary">新しい候補を採用</button>
        <button type="button" id="resolveBtn">この内容で確定</button>
      </div>
      <p class="status" id="resolveMsg"></p>
    </div>

    <dl class="detail" id="cardDetail"></dl>
    <button type="button" id="editBtn">編集する</button>

    <details style="margin-top:14px;">
      <summary>別のカードをこのカードに統合する（手動統合）</summary>
      <label for="mergeSource">統合元カード（このカードに吸収され、無効化されます）</label>
      <select id="mergeSource"></select>
      <button type="button" id="mergeBtn" class="secondary">統合する</button>
      <p class="status" id="mergeMsg"></p>
    </details>
  </div>

  <!-- 編集 -->
  <div id="editView" hidden>
    <span class="backlink" id="editBack">‹ 詳細へ戻る</span>
    <label for="editQuestion">質問</label>
    <input type="text" id="editQuestion">
    <label for="editAnswer">答え（canonicalAnswer）</label>
    <textarea id="editAnswer"></textarea>
    <label for="editSupplement">補足（1行に1つ）</label>
    <textarea id="editSupplement"></textarea>
    <label for="editQualification">資格・コース</label>
    <input type="text" id="editQualification">
    <label for="editSubject">分野</label>
    <input type="text" id="editSubject">
    <label for="editCardType">カード種別</label>
    <select id="editCardType">
      <option value="definition">definition（定義）</option>
      <option value="difference">difference（違い）</option>
      <option value="condition">condition（条件）</option>
      <option value="procedure">procedure（手順）</option>
      <option value="cause_effect">cause_effect（原因と結果）</option>
      <option value="component">component（構成要素）</option>
      <option value="example">example（具体例）</option>
      <option value="misconception">misconception（誤解しやすい点）</option>
      <option value="comparison">comparison（比較）</option>
    </select>
    <label for="editStatus">状態</label>
    <select id="editStatus">
      <option value="active">有効</option>
      <option value="inactive">無効</option>
    </select>
    <button type="button" id="saveEditBtn">保存</button>
    <p class="status" id="editStatusMsg"></p>
  </div>

<script src="shared.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  let currentCard = null;
  let allCards = [];        // 全カード（手動統合の候補・絞り込み候補の datalist に使う）
  let offset = 0;           // 一覧のページ先頭位置

  function setStatus(message, type = "") {
    $("status").textContent = message;
    $("status").className = "status" + (type ? " " + type : "");
  }

  function showView(name) {
    $("listView").hidden = name !== "list";
    $("detailView").hidden = name !== "detail";
    $("editView").hidden = name !== "edit";
  }

  function pageLimit() {
    return Number($("fLimit").value) || 30;
  }

  // 全カードを取得して、手動統合の候補・資格/分野の入力候補(datalist)を用意する。
  async function loadAll() {
    try {
      const data = await callApi({ action: "listCards" });
      allCards = data.cards || [];
      fillDatalist("qualList", allCards.map((c) => c.qualification));
      fillDatalist("subjList", allCards.map((c) => c.subject));
    } catch (error) {
      // 候補が用意できなくても一覧表示は続行する。
    }
  }

  function fillDatalist(id, values) {
    const seen = [];
    for (const v of values) {
      const s = String(v || "").trim();
      if (s && !seen.includes(s)) seen.push(s);
    }
    seen.sort((a, b) => a.localeCompare(b, "ja"));
    $(id).innerHTML = seen.map((v) => `<option value="${escapeHtml(v)}"></option>`).join("");
  }

  // 絞り込み・並べ替え・ページングを効かせて一覧を読み込む。
  async function loadList() {
    setStatus("読み込み中です...", "");
    try {
      const limit = pageLimit();
      const data = await callApi({
        action: "listCards",
        qualification: $("fQualification").value.trim(),
        subject: $("fSubject").value.trim(),
        q: $("fQuery").value.trim(),
        sort: $("fSort").value,
        limit,
        offset
      });

      const cards = data.cards || [];
      const total = Number(data.total || cards.length);
      const container = $("cardList");
      container.innerHTML = "";

      if (total === 0) {
        const anyFilter = $("fQualification").value || $("fSubject").value || $("fQuery").value;
        container.innerHTML = `<p style="color:var(--muted)">${anyFilter ? "条件に合うカードがありません。" : "まだカードがありません。セッションを保存してカードを採用してください。"}</p>`;
        $("pager").hidden = true;
        setStatus("", "");
        return;
      }

      for (const card of cards) {
        const div = document.createElement("div");
        div.className = "card-row";
        const nextReview = card.review?.nextReviewDate || "";
        const inactive = card.status === "inactive" ? '<span class="badge">無効</span>' : "";
        const needsReview = card.status === "needs_review"
          ? '<span class="badge" style="background:var(--error);color:#fff">要確認</span>' : "";
        const mastered = card.review?.mastered
          ? '<span class="badge" style="background:var(--ok);color:#fff">リリカイ済み</span>' : "";
        div.innerHTML = `
          <h3>${escapeHtml(card.question || "(質問なし)")}</h3>
          <div class="card-meta">
            <span class="badge">${escapeHtml(card.cardType || "")}</span>
            ${needsReview}${inactive}${mastered}
            ${escapeHtml(card.qualification || "")}｜${escapeHtml(card.subject || "")}
            ${nextReview ? "｜次回復習 " + escapeHtml(nextReview) : ""}
          </div>`;
        div.addEventListener("click", () => openDetail(card.cardId));
        container.appendChild(div);
      }

      renderPager(total);
      setStatus("", "");
    } catch (error) {
      setStatus(error.message || "読み込みに失敗しました。", "error");
    }
  }

  function renderPager(total) {
    const limit = pageLimit();
    const from = total === 0 ? 0 : offset + 1;
    const to = Math.min(offset + limit, total);
    $("pageInfo").textContent = `${from}〜${to} / ${total}件`;
    $("prevBtn").disabled = offset <= 0;
    $("nextBtn").disabled = offset + limit >= total;
    $("pager").hidden = total <= limit && offset === 0;
  }

  // 一覧とメタ情報（統合候補・datalist）をまとめて再読み込みする。
  async function refreshAll() {
    await loadAll();
    await loadList();
  }

  function applyFilters() {
    offset = 0;
    loadList();
  }

  function clearFilters() {
    $("fQualification").value = "";
    $("fSubject").value = "";
    $("fQuery").value = "";
    $("fSort").value = "";
    offset = 0;
    loadList();
  }

  async function openDetail(cardId) {
    setStatus("カードを読み込み中です...", "");
    try {
      const data = await callApi({ action: "getCard", cardId });
      currentCard = data.card;
      const c = currentCard;
      const supplement = (c.supplement || []).length
        ? "<ul>" + c.supplement.map((s) => `<li>${escapeHtml(s)}</li>`).join("") + "</ul>"
        : "(なし)";

      const statusLabel = c.status === "inactive" ? "無効"
        : c.status === "needs_review" ? "要確認（矛盾）" : "有効";

      $("cardDetail").innerHTML = `
        <dt>質問</dt><dd>${escapeHtml(c.question || "")}</dd>
        <dt>答え（canonicalAnswer）</dt><dd>${escapeHtml(c.canonicalAnswer || "")}</dd>
        <dt>補足</dt><dd>${supplement}</dd>
        <dt>カード種別</dt><dd>${escapeHtml(c.cardType || "")}</dd>
        <dt>conceptKey</dt><dd>${escapeHtml(c.conceptKey || "")}</dd>
        <dt>資格・分野</dt><dd>${escapeHtml(c.qualification || "")}｜${escapeHtml(c.subject || "")}</dd>
        <dt>答えの出所</dt><dd>${c.answerSource === "user" ? "ユーザー編集" : "AI生成"}</dd>
        <dt>状態</dt><dd>${statusLabel}</dd>
        <dt>次回復習日</dt><dd>${escapeHtml(c.review?.nextReviewDate || "")}</dd>
        <dt>出所セッション</dt><dd>${escapeHtml((c.sourceSessionIds || []).join(", ") || "(なし)")}</dd>
      `;

      renderConflictPanel(c);
      renderMergeSelector(c);
      setStatus("", "");
      showView("detail");
    } catch (error) {
      setStatus(error.message || "カードの読み込みに失敗しました。", "error");
    }
  }

  function openEdit() {
    if (!currentCard) return;
    const c = currentCard;
    $("editQuestion").value = c.question || "";
    $("editAnswer").value = c.canonicalAnswer || "";
    $("editSupplement").value = (c.supplement || []).join("\n");
    $("editQualification").value = c.qualification || "";
    $("editSubject").value = c.subject || "";
    $("editCardType").value = c.cardType || "definition";
    $("editStatus").value = c.status === "inactive" ? "inactive" : "active";
    $("editStatusMsg").textContent = "";
    showView("edit");
  }

  async function saveEdit() {
    if (!currentCard) return;
    const payload = {
      action: "updateCard",
      cardId: currentCard.cardId,
      question: $("editQuestion").value.trim(),
      canonicalAnswer: $("editAnswer").value.trim(),
      supplement: $("editSupplement").value.split("\n").map((s) => s.trim()).filter(Boolean),
      qualification: $("editQualification").value.trim(),
      subject: $("editSubject").value.trim(),
      cardType: $("editCardType").value,
      status: $("editStatus").value
    };

    if (!payload.question || !payload.canonicalAnswer) {
      $("editStatusMsg").textContent = "質問と答えは必須です。";
      $("editStatusMsg").className = "status error";
      return;
    }

    $("saveEditBtn").disabled = true;
    $("editStatusMsg").textContent = "保存中です...";
    $("editStatusMsg").className = "status";

    try {
      const res = await callApi(payload);
      currentCard = res.card;
      $("editStatusMsg").textContent = "保存しました。";
      $("editStatusMsg").className = "status ok";
      await openDetail(currentCard.cardId);
      await refreshAll();
    } catch (error) {
      $("editStatusMsg").textContent = error.message || "保存に失敗しました。";
      $("editStatusMsg").className = "status error";
    } finally {
      $("saveEditBtn").disabled = false;
    }
  }

  // needs_review の解決UI（§11.4）
  function renderConflictPanel(c) {
    const panel = $("conflictPanel");
    if (c.status !== "needs_review" || !c.pendingAnswer) {
      panel.hidden = true;
      return;
    }
    panel.hidden = false;
    $("conflictBody").innerHTML = `
      <div>既存の正解: ${escapeHtml(c.canonicalAnswer || "")}</div>
      <div>新しい候補: ${escapeHtml(c.pendingAnswer.canonicalAnswer || "")}</div>`;
    $("resolveAnswer").value = c.canonicalAnswer || "";
    $("resolveMsg").textContent = "";
  }

  async function resolveConflict() {
    if (!currentCard) return;
    const canonicalAnswer = $("resolveAnswer").value.trim();
    if (!canonicalAnswer) {
      $("resolveMsg").textContent = "答えを入力してください。";
      $("resolveMsg").className = "status error";
      return;
    }
    $("resolveBtn").disabled = true;
    $("resolveMsg").textContent = "確定中です...";
    $("resolveMsg").className = "status";
    try {
      const res = await callApi({
        action: "resolveConflict",
        cardId: currentCard.cardId,
        canonicalAnswer,
        supplement: currentCard.supplement || []
      });
      currentCard = res.card;
      await openDetail(currentCard.cardId);
      await refreshAll();
    } catch (error) {
      $("resolveMsg").textContent = error.message || "確定に失敗しました。";
      $("resolveMsg").className = "status error";
    } finally {
      $("resolveBtn").disabled = false;
    }
  }

  // 手動統合（§15）：このカード(target)へ別カード(source)を吸収する
  function renderMergeSelector(c) {
    const sel = $("mergeSource");
    sel.innerHTML = '<option value="">選択してください</option>';
    for (const card of allCards) {
      if (card.cardId === c.cardId) continue;
      if (card.status === "merged") continue;
      const opt = document.createElement("option");
      opt.value = card.cardId;
      opt.textContent = `${card.question}（${card.cardType}）`;
      sel.appendChild(opt);
    }
    $("mergeMsg").textContent = "";
  }

  async function mergeCards() {
    if (!currentCard) return;
    const sourceCardId = $("mergeSource").value;
    if (!sourceCardId) {
      $("mergeMsg").textContent = "統合元カードを選んでください。";
      $("mergeMsg").className = "status error";
      return;
    }
    $("mergeBtn").disabled = true;
    $("mergeMsg").textContent = "統合中です...";
    $("mergeMsg").className = "status";
    try {
      const res = await callApi({
        action: "mergeCardsManual",
        targetCardId: currentCard.cardId,
        sourceCardId
      });
      currentCard = res.card;
      await openDetail(currentCard.cardId);
      await refreshAll();
      $("mergeMsg").textContent = "統合しました。";
      $("mergeMsg").className = "status ok";
    } catch (error) {
      $("mergeMsg").textContent = error.message || "統合に失敗しました。";
      $("mergeMsg").className = "status error";
    } finally {
      $("mergeBtn").disabled = false;
    }
  }

  $("detailBack").addEventListener("click", () => showView("list"));
  $("editBack").addEventListener("click", () => showView("detail"));
  $("editBtn").addEventListener("click", openEdit);
  $("saveEditBtn").addEventListener("click", saveEdit);
  $("useExistingBtn").addEventListener("click", () => { $("resolveAnswer").value = currentCard?.canonicalAnswer || ""; });
  $("useNewBtn").addEventListener("click", () => { $("resolveAnswer").value = currentCard?.pendingAnswer?.canonicalAnswer || ""; });
  $("resolveBtn").addEventListener("click", resolveConflict);
  $("mergeBtn").addEventListener("click", mergeCards);
  $("saveApiUrlBtn").addEventListener("click", () => {
    setApiUrl($("apiUrl").value);
    setStatus("API URLを保存しました。再読み込みします。", "");
    refreshAll();
  });

  // 絞り込み・並べ替え・ページング
  $("searchBtn").addEventListener("click", applyFilters);
  $("clearFilterBtn").addEventListener("click", clearFilters);
  $("fSort").addEventListener("change", applyFilters);
  $("fLimit").addEventListener("change", applyFilters);
  ["fQualification", "fSubject", "fQuery"].forEach((id) => {
    $(id).addEventListener("keydown", (e) => { if (e.key === "Enter") applyFilters(); });
  });
  $("prevBtn").addEventListener("click", () => {
    offset = Math.max(offset - pageLimit(), 0);
    loadList();
  });
  $("nextBtn").addEventListener("click", () => {
    offset = offset + pageLimit();
    loadList();
  });

  $("apiUrl").value = getApiUrl();
  refreshAll();
</script>
</body>
</html>
