<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReRIKAI - 学習セッション</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a;
    --bg: #ffffff;
    --border: #d0d0d0;
    --accent: #2563eb;
    --muted: #666;
    --error: #c0392b;
    --ok: #1e7e34;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #eaeaea;
      --bg: #121212;
      --border: #444;
      --accent: #60a5fa;
      --muted: #aaa;
      --error: #ff6b6b;
      --ok: #4ade80;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    color: var(--fg);
    background: var(--bg);
    line-height: 1.6;
  }
  h1 { font-size: 1.3rem; }
  fieldset {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    padding: 12px;
  }
  legend { padding: 0 6px; color: var(--muted); font-size: 0.9rem; }
  label { display: block; margin-top: 10px; font-size: 0.9rem; }
  input[type="text"], input[type="date"], input[type="number"], textarea {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--fg);
    font-size: 1rem;
  }
  textarea { min-height: 90px; resize: vertical; }
  #transcript { min-height: 200px; }
  button {
    margin-top: 14px;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { margin-top: 12px; white-space: pre-wrap; font-size: 0.9rem; color: var(--muted); }
  .status.error { color: var(--error); }
  .status.ok { color: var(--ok); }
  .result { margin-top: 20px; }
  .result h2 { font-size: 1.05rem; margin-bottom: 4px; }
  .result ul { margin-top: 4px; }
  details { margin-top: 16px; }
  #apiUrl { font-size: 0.8rem; }
  .hint { font-size: 0.85rem; color: var(--muted); }
  .card-cand { border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 10px; }
  .card-cand.excluded { opacity: 0.5; }
  .card-cand-head { display: flex; align-items: center; gap: 8px; }
  .card-cand-head input[type="checkbox"] { width: auto; margin: 0; }
  .card-cand-type { font-size: 0.7rem; background: var(--border); border-radius: 4px; padding: 1px 6px; }
  .card-cand label { font-size: 0.8rem; margin-top: 6px; color: var(--muted); }
  .card-cand input[type="text"], .card-cand textarea { font-size: 0.9rem; }
  .card-cand .reason { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
  <h1>ReRIKAI - 学習セッション</h1>
  <div style="margin-bottom:12px;font-size:0.9rem;">
    <a href="calendar.html" style="color:var(--accent)">📅 カレンダー</a>
    ｜<a href="cards.html" style="color:var(--accent)">🗂 カード一覧</a>
    ｜<a href="review.html" style="color:var(--accent)">🔁 復習</a>
  </div>

  <details>
    <summary>API接続設定</summary>
    <label for="apiUrl">API URL</label>
    <input type="text" id="apiUrl" placeholder="https://xxxx.execute-api.ap-northeast-1.amazonaws.com/api">
    <button type="button" id="saveApiUrlBtn">保存</button>
  </details>

  <form id="sessionForm">
    <fieldset>
      <legend>基本情報</legend>

      <label for="studyDate">学習日</label>
      <input type="date" id="studyDate">

      <label for="qualification">資格・コース</label>
      <input type="text" id="qualification" placeholder="例: AWS SOA-C03">

      <label for="subject">分野（必須）</label>
      <input type="text" id="subject" placeholder="例: Monitoring" required>

      <label for="topic">テーマ</label>
      <input type="text" id="topic" placeholder="例: CloudWatchとCloudTrail">

      <label for="durationMinutes">学習時間（分）</label>
      <input type="number" id="durationMinutes" value="25" min="1">
    </fieldset>

    <fieldset>
      <legend>今日の目的・分からなかった点</legend>

      <label for="purpose">今日の目的</label>
      <textarea id="purpose" placeholder="例: NAT GatewayとInternet Gatewayの違いを説明できるようにする"></textarea>

      <label for="notUnderstoodNote">自分で分からなかった点</label>
      <textarea id="notUnderstoodNote"></textarea>
    </fieldset>

    <fieldset>
      <legend>文字起こし貼り付け欄（必須）</legend>
      <textarea id="transcript" placeholder="ここにiPhoneの文字起こしや、学習中の独り言を貼ります。" required></textarea>
    </fieldset>

    <label style="display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="generateCards" checked style="width:auto;margin:0;">
      復習カードを生成する
    </label>

    <button type="submit" id="saveBtn">保存してAI分析を開始</button>
  </form>

  <div class="status" id="status"></div>

  <div class="result" id="result" hidden>
    <h2>今日の目的の達成判定</h2>
    <p id="purposeJudgement"></p>

    <h2>理解できている点</h2>
    <ul id="understoodPoints"></ul>

    <h2>曖昧な点</h2>
    <ul id="ambiguousPoints"></ul>

    <h2>誤解の可能性</h2>
    <ul id="misconceptions"></ul>

    <h2>確認質問</h2>
    <ol id="confirmQuestions"></ol>

    <h2>復習事項</h2>
    <ul id="reviewItems"></ul>

    <button type="button" id="viewMarkdownBtn">Markdownを表示</button>

    <div id="cardCandidatesArea" hidden>
      <h2>復習カード候補</h2>
      <p class="hint" id="cardCandidatesHint"></p>
      <div id="cardCandidates"></div>
      <button type="button" id="adoptCardsBtn">選択したカードを保存</button>
      <p class="status" id="adoptStatus"></p>
    </div>
  </div>

<script src="shared.js"></script>
<script>
  const POLL_INTERVAL_MS = 3000;
  const POLL_TIMEOUT_MS = 180000;

  const $ = (id) => document.getElementById(id);
  let isSaving = false;
  let currentSessionSk = null;
  let currentSessionId = null;
  let currentCandidates = [];
  let pendingAdoption = null; // { selected, results }

  function todayJst() {
    const now = new Date();
    const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
    return jst.toISOString().slice(0, 10);
  }

  function setStatus(message, type = "") {
    const el = $("status");
    el.textContent = message;
    el.className = "status" + (type ? " " + type : "");
  }

  function renderList(elId, items) {
    const el = $(elId);
    el.innerHTML = "";
    (items || []).forEach((item) => {
      const li = document.createElement("li");
      li.textContent = item;
      el.appendChild(li);
    });
  }

  function renderResult(session) {
    $("result").hidden = false;
    $("purposeJudgement").textContent = session.purposeJudgement
      ? `${session.purposeJudgement.status}（${session.purposeJudgement.reason}）`
      : "(今日の目的は未入力、または判定なし)";
    renderList("understoodPoints", session.understoodPoints);
    renderList("ambiguousPoints", session.ambiguousPoints);
    renderList("misconceptions", session.misconceptions);
    renderList("confirmQuestions", session.confirmQuestions);
    renderList("reviewItems", session.reviewItems);
    currentSessionId = session.sessionId || null;
    currentCandidates = session.cardCandidates || [];
    renderCardCandidates(session);
  }

  async function pollSession(sessionSk) {
    const startedAt = Date.now();

    while (Date.now() - startedAt < POLL_TIMEOUT_MS) {
      await sleep(POLL_INTERVAL_MS);

      const data = await callApi({ action: "getSession", sessionSk });

      if (data.status === "error") {
        throw new Error(data.message || "AI分析に失敗しました。");
      }

      if (data.status === "ok" && data.sessionStatus === "completed") {
        const s = data.session;
        // カード生成はセッション完了の後に走るので、pending の間は待つ。
        if (s.generateCards && s.cardStatus === "pending") {
          const elapsedSec = Math.floor((Date.now() - startedAt) / 1000);
          setStatus(`カード候補を生成中です。経過 ${elapsedSec}秒`, "");
          continue;
        }
        return s;
      }

      const elapsedSec = Math.floor((Date.now() - startedAt) / 1000);
      setStatus(`AI分析中です。経過 ${elapsedSec}秒`, "");
    }

    throw new Error("AI分析に時間がかかっています。しばらく待ってから再度確認してください。");
  }

  function renderCardCandidates(session) {
    const area = $("cardCandidatesArea");
    const container = $("cardCandidates");
    container.innerHTML = "";
    $("adoptStatus").textContent = "";

    if (!session.generateCards) {
      area.hidden = true;
      return;
    }

    if (session.cardStatus === "failed") {
      area.hidden = false;
      $("cardCandidatesHint").textContent = "カード候補の生成に失敗しました。セッションは保存されています。";
      $("adoptCardsBtn").hidden = true;
      return;
    }

    const candidates = session.cardCandidates || [];
    if (candidates.length === 0) {
      area.hidden = false;
      $("cardCandidatesHint").textContent = "今回のセッションからは復習カード候補が作られませんでした。";
      $("adoptCardsBtn").hidden = true;
      return;
    }

    area.hidden = false;
    $("adoptCardsBtn").hidden = false;
    $("cardCandidatesHint").textContent =
      "採用するカードにチェックを入れてください（内容は編集できます）。不要なカードはチェックを外します。";

    candidates.forEach((c, i) => {
      const div = document.createElement("div");
      div.className = "card-cand";
      div.dataset.index = i;
      div.innerHTML = `
        <div class="card-cand-head">
          <input type="checkbox" class="cand-check" checked>
          <span class="card-cand-type">${escapeHtml(c.cardType || "definition")}</span>
          <span style="font-size:0.7rem;color:var(--muted)">${escapeHtml(c.conceptKey || "")}</span>
        </div>
        <label>質問</label>
        <input type="text" class="cand-question" value="${escapeHtml(c.question || "")}">
        <label>答え（canonicalAnswer）</label>
        <textarea class="cand-answer" style="min-height:56px;">${escapeHtml(c.canonicalAnswer || "")}</textarea>
        <label>補足（1行に1つ）</label>
        <textarea class="cand-supplement" style="min-height:44px;">${escapeHtml((c.supplement || []).join("\n"))}</textarea>
        ${c.reason ? `<div class="reason">理由: ${escapeHtml(c.reason)}</div>` : ""}
      `;
      const check = div.querySelector(".cand-check");
      check.addEventListener("change", () => {
        div.classList.toggle("excluded", !check.checked);
      });
      container.appendChild(div);
    });
  }

  function collectSelectedCards() {
    const rows = Array.from(document.querySelectorAll("#cardCandidates .card-cand"));
    const cards = [];
    for (const row of rows) {
      if (!row.querySelector(".cand-check").checked) continue;
      const original = currentCandidates[Number(row.dataset.index)] || {};
      const question = row.querySelector(".cand-question").value.trim();
      const canonicalAnswer = row.querySelector(".cand-answer").value.trim();
      const supplement = row.querySelector(".cand-supplement").value
        .split("\n").map((s) => s.trim()).filter(Boolean);
      if (!question || !canonicalAnswer) continue;

      const edited = question !== (original.question || "") ||
        canonicalAnswer !== (original.canonicalAnswer || "") ||
        supplement.join("\n") !== (original.supplement || []).join("\n");

      cards.push({
        question, canonicalAnswer, supplement,
        cardType: original.cardType,
        conceptKey: original.conceptKey,
        answerSource: edited ? "user" : "ai"
      });
    }
    return cards;
  }

  // 採用ボタン：まず重複を確認し、重複があれば§10.5の選択UIを出す。
  async function onAdoptClick() {
    if (!currentSessionSk) return;

    // 重複解決UIが出ている場合は確定処理へ
    if (pendingAdoption) {
      await performAdoption();
      return;
    }

    const selected = collectSelectedCards();
    if (selected.length === 0) {
      $("adoptStatus").textContent = "採用するカードが選ばれていません。";
      $("adoptStatus").className = "status error";
      return;
    }

    $("adoptCardsBtn").disabled = true;
    $("adoptStatus").textContent = "重複を確認中です...";
    $("adoptStatus").className = "status";

    try {
      const res = await callApi({
        action: "checkDuplicates",
        cards: selected.map((c) => ({ question: c.question, cardType: c.cardType, conceptKey: c.conceptKey }))
      });
      const results = res.results || [];
      const hasDup = results.some((r) => (r.duplicates || []).length > 0);

      pendingAdoption = { selected, results };

      if (!hasDup) {
        await performAdoption();
      } else {
        renderDuplicateDecisions();
      }
    } catch (error) {
      $("adoptStatus").textContent = error.message || "重複確認に失敗しました。";
      $("adoptStatus").className = "status error";
      pendingAdoption = null;
    } finally {
      $("adoptCardsBtn").disabled = false;
    }
  }

  // §10.5：重複のある候補ごとに、既存カード更新／新規保存／破棄を選ばせる。
  function renderDuplicateDecisions() {
    const { selected, results } = pendingAdoption;
    const container = $("cardCandidates");

    results.forEach((r, i) => {
      const dups = r.duplicates || [];
      const block = document.createElement("div");
      block.className = "card-cand";
      block.dataset.decisionIndex = i;

      if (dups.length === 0) {
        block.innerHTML = `<div class="reason">新規保存: ${escapeHtml(selected[i].question)}</div>`;
        block.dataset.decision = "new";
      } else {
        const d = dups[0];
        block.innerHTML = `
          <div style="font-size:0.85rem;">既存カードと内容が近い可能性があります。</div>
          <div class="reason">既存: ${escapeHtml(d.question)} ／ ${escapeHtml(d.canonicalAnswer)}</div>
          <div class="reason">新規候補: ${escapeHtml(selected[i].question)} ／ ${escapeHtml(selected[i].canonicalAnswer)}</div>
          <label><input type="radio" name="dec${i}" value="merge" checked style="width:auto"> 既存カードを更新（統合）</label>
          <label><input type="radio" name="dec${i}" value="new" style="width:auto"> 新規カードとして保存</label>
          <label><input type="radio" name="dec${i}" value="skip" style="width:auto"> 破棄</label>
        `;
        block.dataset.dupCardId = d.cardId;
      }
      container.appendChild(block);
    });

    $("cardCandidatesHint").textContent = "重複の可能性があるカードの扱いを選び、「確定して保存」を押してください。";
    $("adoptCardsBtn").textContent = "確定して保存";
  }

  async function performAdoption() {
    const { selected, results } = pendingAdoption;
    $("adoptCardsBtn").disabled = true;
    $("adoptStatus").textContent = "保存中です...";
    $("adoptStatus").className = "status";

    const newCards = [];
    const mergeOps = [];

    results.forEach((r, i) => {
      const dups = r.duplicates || [];
      let decision = "new";
      if (dups.length > 0) {
        const picked = document.querySelector(`input[name="dec${i}"]:checked`);
        decision = picked ? picked.value : "merge";
      }
      if (decision === "new") {
        newCards.push(selected[i]);
      } else if (decision === "merge") {
        mergeOps.push({ cardId: dups[0].cardId, card: selected[i] });
      }
    });

    let savedNew = 0, merged = 0, needsReview = 0;
    const errors = [];

    try {
      if (newCards.length > 0) {
        const res = await callApi({ action: "adoptCards", sessionSk: currentSessionSk, cards: newCards });
        savedNew = (res.cards || []).length;
      }
      for (const op of mergeOps) {
        try {
          const res = await callApi({
            action: "mergeAnswerIntoCard",
            cardId: op.cardId,
            canonicalAnswer: op.card.canonicalAnswer,
            supplement: op.card.supplement,
            sourceSessionId: currentSessionId,
            sessionSk: currentSessionSk
          });
          if (res.result === "needs_review") needsReview++; else merged++;
        } catch (e) {
          errors.push(e.message || "統合に失敗");
        }
      }

      let msg = `新規${savedNew}枚・統合${merged}件`;
      if (needsReview > 0) msg += `・要確認${needsReview}件（矛盾のためカード一覧で確認してください）`;
      if (errors.length) msg += `・失敗${errors.length}件`;
      $("adoptStatus").textContent = msg + "を保存しました。";
      $("adoptStatus").className = errors.length ? "status error" : "status ok";
      $("adoptCardsBtn").hidden = true;
    } catch (error) {
      $("adoptStatus").textContent = error.message || "カードの保存に失敗しました。";
      $("adoptStatus").className = "status error";
    } finally {
      $("adoptCardsBtn").disabled = false;
      pendingAdoption = null;
    }
  }

  $("sessionForm").addEventListener("submit", async (event) => {
    event.preventDefault();
    if (isSaving) return;

    const payload = {
      action: "createSession",
      studyDate: $("studyDate").value || todayJst(),
      qualification: $("qualification").value.trim(),
      subject: $("subject").value.trim(),
      topic: $("topic").value.trim(),
      durationMinutes: Number($("durationMinutes").value || 25),
      purpose: $("purpose").value.trim(),
      notUnderstoodNote: $("notUnderstoodNote").value.trim(),
      transcript: $("transcript").value.trim(),
      generateCards: $("generateCards").checked
    };

    if (!payload.transcript) {
      setStatus("文字起こし欄が空です。", "error");
      return;
    }
    if (!payload.subject) {
      setStatus("分野を入力してください。", "error");
      return;
    }

    isSaving = true;
    $("saveBtn").disabled = true;
    $("result").hidden = true;
    setStatus("保存中です...", "");

    try {
      const start = await callApi(payload);

      if (start.status !== "processing" || !start.sessionSk) {
        throw new Error(start.message || "セッションの作成に失敗しました。");
      }

      currentSessionSk = start.sessionSk;
      setStatus("AI分析を開始しました。しばらく待ちます。", "");

      const session = await pollSession(start.sessionSk);
      setStatus("AI分析が完了しました。", "ok");
      renderResult(session);
    } catch (error) {
      setStatus(error.message || "エラーが発生しました。", "error");
    } finally {
      isSaving = false;
      $("saveBtn").disabled = false;
    }
  });

  $("viewMarkdownBtn").addEventListener("click", async () => {
    if (!currentSessionSk) return;
    try {
      const data = await callApi({ action: "getSessionMarkdown", sessionSk: currentSessionSk });
      if (data.url) {
        window.open(data.url, "_blank", "noopener");
      }
    } catch (error) {
      setStatus(error.message || "Markdownの取得に失敗しました。", "error");
    }
  });

  $("adoptCardsBtn").addEventListener("click", onAdoptClick);

  $("saveApiUrlBtn").addEventListener("click", () => {
    setApiUrl($("apiUrl").value);
    setStatus("API URLを保存しました。", "ok");
  });

  $("studyDate").value = todayJst();
  $("apiUrl").value = getApiUrl();
</script>
</body>
</html>
